<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create account - KIYO COAST</title>
  <meta name="description" content="Create your Kiyo Coast guest account.">

  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">

  <style>
    .register__wrap {
      min-height: calc(100vh - 72px);
      display: flex; align-items: center; justify-content: center;
      padding: var(--space-6) var(--space-4);
      background: linear-gradient(180deg, var(--sand-50) 0%, var(--sand-100) 100%);
    }
    .register__card {
      width: 100%; max-width: 520px;
      background: var(--sand-50);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-md);
      padding: var(--space-6);
    }
    .register__title { font-family: var(--font-display); font-size: var(--fs-2xl); margin-bottom: var(--space-1); color: var(--ink-900); }
    .register__subtitle { color: var(--ink-500); margin-bottom: var(--space-5); }
    .register__row {
      display: grid; grid-template-columns: 1fr; gap: var(--space-3);
    }
    @media (min-width: 600px) {
      .register__row { grid-template-columns: 1fr 1fr; }
    }
    .register__field { margin-bottom: var(--space-4); }
    .register__password-wrap { position: relative; }
    .register__eye-toggle {
      position: absolute; right: var(--space-3); top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: var(--ink-500);
      font-size: var(--fs-md); padding: var(--space-1);
    }
    .register__terms { display: flex; align-items: flex-start; gap: var(--space-3); margin: var(--space-4) 0 var(--space-5); font-size: var(--fs-sm); color: var(--ink-700); }
    .register__terms a { color: var(--teal-500); }
    .register__footer { text-align: center; margin-top: var(--space-5); font-size: var(--fs-sm); }
    .register__strength {
      margin-top: var(--space-2);
      font-size: var(--fs-xs);
      color: var(--ink-500);
    }
    .register__strength-bar {
      height: 4px; background: var(--sand-200); border-radius: var(--radius-pill);
      margin-top: var(--space-1); overflow: hidden;
    }
    .register__strength-bar-fill {
      height: 100%; width: 0%; background: var(--terra-500);
      transition: all var(--dur-fast) var(--ease-soft);
    }
    .register__strength-bar-fill.is-weak { background: var(--terra-500); width: 25%; }
    .register__strength-bar-fill.is-medium { background: var(--coral-500); width: 60%; }
    .register__strength-bar-fill.is-strong { background: var(--teal-500); width: 100%; }
  </style>
</head>
<body>
  <div data-component="site-header"></div>

  <main class="register__wrap">
    <div class="register__card">
      <h1 class="register__title">Create your account</h1>
      <p class="register__subtitle">Book stays, reserve parking, browse coastal stalls.</p>

      <form id="registerForm" novalidate>
        <div class="field register__field">
          <label class="label" for="regName">Full name</label>
          <input class="input" type="text" id="regName" name="name" autocomplete="name" required minlength="2">
          <span class="field__error" data-error-for="name"></span>
        </div>

        <div class="register__row">
          <div class="field register__field">
            <label class="label" for="regEmail">Email</label>
            <input class="input" type="email" id="regEmail" name="email" autocomplete="email" required>
            <span class="field__error" data-error-for="email"></span>
          </div>
          <div class="field register__field">
            <label class="label" for="regPhone">Phone</label>
            <input class="input" type="tel" id="regPhone" name="phone" autocomplete="tel" placeholder="+60 12-345 6789">
            <span class="field__error" data-error-for="phone"></span>
          </div>
        </div>

        <div class="field register__field">
          <label class="label" for="regPassword">Password</label>
          <div class="register__password-wrap">
            <input class="input" type="password" id="regPassword" name="password" autocomplete="new-password" required minlength="6">
            <button type="button" class="register__eye-toggle" aria-label="Show password" data-action="toggle-password" data-target="regPassword">&#128065;</button>
          </div>
          <div class="register__strength">
            <span data-strength-label>Strength: enter a password</span>
            <div class="register__strength-bar"><div class="register__strength-bar-fill" data-strength-fill></div></div>
          </div>
          <span class="field__error" data-error-for="password"></span>
        </div>

        <div class="field register__field">
          <label class="label" for="regConfirm">Confirm password</label>
          <div class="register__password-wrap">
            <input class="input" type="password" id="regConfirm" name="confirm" autocomplete="new-password" required>
            <button type="button" class="register__eye-toggle" aria-label="Show password" data-action="toggle-password" data-target="regConfirm">&#128065;</button>
          </div>
          <span class="field__error" data-error-for="confirm"></span>
        </div>

        <label class="register__terms">
          <input type="checkbox" name="terms" required>
          <span>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.</span>
        </label>

        <button type="submit" class="btn btn--primary btn--block btn--lg">Create account</button>
      </form>

      <p class="register__footer">Already have an account? <a href="login.html">Sign in &rarr;</a></p>
    </div>
  </main>

  <script src="js/utils.js"></script>
  <script src="js/store.js"></script>
  <script src="js/seed.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/components/toast.js"></script>
  <script src="js/components/modal.js"></script>
  <script src="js/components/header.js"></script>
  <script src="js/app.js"></script>
  <script src="js/pages/register.js"></script>
</body>
</html>
